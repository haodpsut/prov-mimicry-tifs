# Conda env for the smoke test. Create with:  conda env create -f environment.yml -n prov-mimicry
# torch + dgl are installed separately (see run_server.sh / README) so the CUDA
# build matches the server. Verified combo for RTX 4090 (Ada / sm_89) + CUDA 12.1:
#   torch==2.1.0 (cu121)  +  dgl from the torch-2.1/cu121 wheel channel.
# numpy MUST stay <2 -- torch 2.1 / dgl 2.x were built against numpy 1.x.
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - unzip
  - git
  - pip:
      - "numpy<2"
      - scikit-learn
      - networkx
      - xxhash
      - tqdm
