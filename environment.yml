# Conda env for the smoke test. Create with:  conda env create -f environment.yml -n prov-mimicry
# torch + dgl are installed separately (see run_server.sh / README) so the CUDA
# build matches the server's driver -- MAGIC pinned torch 1.12 which predates the
# RTX 4090 (Ada / sm_89), so use a cu118+ torch 2.x stack there.
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - unzip
  - git
  - pip:
      - numpy
      - scikit-learn
      - networkx
      - xxhash
      - tqdm
